<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RC Sınavım - Öğretmen Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0F0F1A; color: #fff; min-height: 100vh; }

        /* ─── LOGIN ─── */
        .login-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #0F0F1A 0%, #1A1A2E 50%, #16213E 100%); }
        .login-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 48px; width: 420px; backdrop-filter: blur(20px); }
        .login-card h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .login-card p { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 32px; }
        .login-card input { width: 100%; padding: 16px 18px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.08); color: #fff; font-size: 15px; margin-bottom: 14px; outline: none; font-family: inherit; transition: border-color 0.2s; }
        .login-card input:focus { border-color: #6C3CE1; }
        .login-card input::placeholder { color: rgba(255,255,255,0.3); }
        .login-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, #6C3CE1, #4A1DB5); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
        .login-btn:hover { opacity: 0.9; }
        .login-error { color: #EF4444; font-size: 13px; margin-top: 12px; text-align: center; display: none; }

        /* ─── DASHBOARD ─── */
        .dashboard { display: none; }
        .topbar { background: linear-gradient(135deg, #6C3CE1, #4A1DB5); padding: 24px 32px; display: flex; justify-content: space-between; align-items: center; }
        .topbar h2 { font-size: 22px; font-weight: 800; }
        .topbar .info { display: flex; align-items: center; gap: 16px; }
        .topbar .teacher-name { font-size: 14px; color: rgba(255,255,255,0.8); }
        .topbar .logout-btn { padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; font-size: 13px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        .topbar .logout-btn:hover { background: rgba(255,255,255,0.2); }
        
        .invite-bar { background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
        .invite-bar span { color: rgba(255,255,255,0.5); font-size: 13px; }
        .invite-code { background: rgba(108,60,225,0.15); color: #A78BFA; padding: 8px 18px; border-radius: 10px; font-weight: 700; font-size: 16px; letter-spacing: 2px; cursor: pointer; }
        .invite-code:hover::after { content: ' (kopyala)'; font-size: 11px; letter-spacing: 0; opacity: 0.6; }

        .main-content { padding: 32px; }
        .section-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-title .count { background: rgba(108,60,225,0.15); color: #A78BFA; padding: 4px 12px; border-radius: 10px; font-size: 13px; }
        
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .student-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 24px; transition: all 0.25s; cursor: pointer; }
        .student-card:hover { border-color: rgba(108,60,225,0.3); background: rgba(255,255,255,0.06); transform: translateY(-2px); }
        .student-card .student-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .student-avatar { width: 46px; height: 46px; border-radius: 14px; background: linear-gradient(135deg, #6C3CE1, #4A1DB5); display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: 800; flex-shrink: 0; }
        .student-name { font-size: 16px; font-weight: 700; }
        .student-email { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
        .student-stats { display: flex; gap: 12px; }
        .stat-chip { background: rgba(255,255,255,0.06); padding: 8px 14px; border-radius: 10px; font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 600; }
        .stat-chip strong { color: #fff; }
        .assign-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; background: rgba(108,60,225,0.15); color: #A78BFA; font-weight: 700; cursor: pointer; margin-top: 16px; font-size: 13px; transition: background 0.2s; font-family: inherit; }
        .assign-btn:hover { background: rgba(108,60,225,0.25); }

        .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 15px; max-width: 380px; margin: 0 auto; line-height: 1.6; }

        /* ─── MODAL ─── */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal { background: #1A1A2E; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 32px; width: 560px; max-height: 85vh; overflow-y: auto; }
        .modal h3 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
        .modal .modal-sub { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 24px; }
        .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: rgba(255,255,255,0.5); font-size: 20px; cursor: pointer; }
        
        .day-section { margin-bottom: 20px; }
        .day-label { font-size: 14px; font-weight: 700; color: #A78BFA; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .task-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
        .task-row input { flex: 1; padding: 12px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06); color: #fff; font-size: 14px; outline: none; font-family: inherit; }
        .task-row input:focus { border-color: #6C3CE1; }
        .task-row input::placeholder { color: rgba(255,255,255,0.3); }
        .task-row .duration-input { width: 100px; }
        .task-row .question-input { width: 80px; }
        .remove-task-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: rgba(239,68,68,0.15); color: #EF4444; cursor: pointer; font-size: 16px; flex-shrink: 0; }
        
        .add-task-btn { padding: 8px 16px; border-radius: 10px; border: 1px dashed rgba(255,255,255,0.15); background: none; color: rgba(255,255,255,0.4); font-size: 13px; cursor: pointer; font-family: inherit; width: 100%; transition: all 0.2s; }
        .add-task-btn:hover { border-color: #6C3CE1; color: #A78BFA; }
        
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
        .modal-cancel { padding: 12px 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: none; color: rgba(255,255,255,0.6); font-weight: 600; cursor: pointer; font-family: inherit; }
        .modal-save { padding: 12px 28px; border-radius: 12px; border: none; background: linear-gradient(135deg, #6C3CE1, #4A1DB5); color: #fff; font-weight: 700; cursor: pointer; font-family: inherit; font-size: 14px; }
        .modal-save:hover { opacity: 0.9; }
        
        .toast { position: fixed; bottom: 30px; right: 30px; padding: 16px 24px; border-radius: 14px; font-weight: 600; font-size: 14px; z-index: 200; animation: slideIn 0.3s ease; }
        .toast.success { background: #10B981; color: #fff; }
        .toast.error { background: #EF4444; color: #fff; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- ═══ LOGIN PAGE ═══ -->
<div class="login-page" id="loginPage">
    <div class="login-card">
        <h1>🎓 Öğretmen Paneli</h1>
        <p>RC Sınavım öğretmen hesabınızla giriş yapın.</p>
        <input type="email" id="loginEmail" placeholder="E-posta adresiniz" />
        <input type="password" id="loginPassword" placeholder="Şifreniz" />
        <button class="login-btn" onclick="handleLogin()">Giriş Yap</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div class="dashboard" id="dashboard">
    <div class="topbar">
        <h2>🎓 RC Sınavım Paneli</h2>
        <div class="info">
            <span class="teacher-name" id="teacherName"></span>
            <button class="logout-btn" onclick="handleLogout()">Çıkış Yap</button>
        </div>
    </div>
    
    <div class="invite-bar">
        <span>Kurum Katılım Kodu:</span>
        <span class="invite-code" id="inviteCode" onclick="copyInviteCode()"></span>
    </div>

    <div class="main-content">
        <div class="section-title">
            Öğrencilerim <span class="count" id="studentCount">0</span>
        </div>
        <div class="student-grid" id="studentGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="icon">👨‍🎓</div>
            <p>Henüz kurumunuza kayıtlı öğrenci yok. Katılım kodunu öğrencilerinizle paylaşın.</p>
        </div>
    </div>
</div>

<!-- ═══ PROGRAM ATAMA MODAL ═══ -->
<div class="modal-overlay" id="assignModal">
    <div class="modal">
        <h3>📅 Haftalık Program Ata</h3>
        <div class="modal-sub" id="modalStudentName"></div>
        
        <div id="programForm"></div>
        
        <div class="modal-actions">
            <button class="modal-cancel" onclick="closeModal()">Vazgeç</button>
            <button class="modal-save" onclick="submitProgram()">Programı Gönder</button>
        </div>
    </div>
</div>

<script>
const API_BASE = window.location.origin;
let currentTeacher = null;
let currentStudentId = null;

const GUNLER = ["Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi", "Pazar"];

// ─── TOAST ───
function showToast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

// ─── LOGIN ───
async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errorEl = document.getElementById('loginError');
    
    if (!email || !password) {
        errorEl.textContent = 'Lütfen tüm alanları doldurun.';
        errorEl.style.display = 'block';
        return;
    }
    
    try {
        const res = await fetch(`${API_BASE}/teacher/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (data.status === 'success') {
            currentTeacher = data.teacher;
            showDashboard();
        } else {
            errorEl.textContent = data.message || 'Giriş başarısız.';
            errorEl.style.display = 'block';
        }
    } catch (e) {
        errorEl.textContent = 'Sunucuya bağlanılamadı.';
        errorEl.style.display = 'block';
    }
}

// Enter tuşu ile login
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
});

function handleLogout() {
    currentTeacher = null;
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
}

// ─── DASHBOARD ───
function showDashboard() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('teacherName').textContent = currentTeacher.name || currentTeacher.email;
    document.getElementById('inviteCode').textContent = currentTeacher.invite_code || '—';
    loadStudents();
}

function copyInviteCode() {
    const code = currentTeacher.invite_code;
    if (code) {
        navigator.clipboard.writeText(code);
        showToast('Katılım kodu kopyalandı!');
    }
}

async function loadStudents() {
    const grid = document.getElementById('studentGrid');
    const empty = document.getElementById('emptyState');
    grid.innerHTML = '<div class="loading-spinner"></div>';
    
    try {
        const res = await fetch(`${API_BASE}/teacher/students/${currentTeacher.id}`);
        const students = await res.json();
        
        document.getElementById('studentCount').textContent = students.length;
        
        if (students.length === 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        
        empty.style.display = 'none';
        grid.innerHTML = students.map(s => `
            <div class="student-card">
                <div class="student-header">
                    <div class="student-avatar">${(s.name || '?')[0].toUpperCase()}</div>
                    <div>
                        <div class="student-name">${s.name || 'İsimsiz'}</div>
                        <div class="student-email">${s.email || '—'}</div>
                    </div>
                </div>
                <div class="student-stats">
                    <div class="stat-chip">📧 ${s.email ? 'Aktif' : 'Pasif'}</div>
                </div>
                <button class="assign-btn" onclick="openAssignModal('${s.id}', '${(s.name || 'Öğrenci').replace(/'/g, "\\'")}')">
                    📅 Haftalık Program Ata
                </button>
            </div>
        `).join('');
    } catch (e) {
        grid.innerHTML = '<p style="color: #EF4444;">Öğrenci listesi yüklenemedi.</p>';
    }
}

// ─── PROGRAM ATAMA MODAL ───
function openAssignModal(studentId, studentName) {
    currentStudentId = studentId;
    document.getElementById('modalStudentName').textContent = `${studentName} için haftalık çalışma programı oluşturun.`;
    
    const form = document.getElementById('programForm');
    form.innerHTML = GUNLER.map(gun => `
        <div class="day-section" data-day="${gun}">
            <div class="day-label">📌 ${gun}</div>
            <div class="day-tasks" id="tasks-${gun}">
                <div class="task-row">
                    <input type="text" placeholder="Ders/Konu Adı" class="task-name" />
                    <input type="text" placeholder="Süre" class="duration-input" value="1 Saat" />
                    <input type="number" placeholder="Soru" class="question-input" value="0" />
                    <button class="remove-task-btn" onclick="this.parentElement.remove()">×</button>
                </div>
            </div>
            <button class="add-task-btn" onclick="addTaskRow('${gun}')">+ Ders Ekle</button>
        </div>
    `).join('');
    
    document.getElementById('assignModal').classList.add('active');
}

function addTaskRow(gun) {
    const container = document.getElementById(`tasks-${gun}`);
    const row = document.createElement('div');
    row.className = 'task-row';
    row.innerHTML = `
        <input type="text" placeholder="Ders/Konu Adı" class="task-name" />
        <input type="text" placeholder="Süre" class="duration-input" value="1 Saat" />
        <input type="number" placeholder="Soru" class="question-input" value="0" />
        <button class="remove-task-btn" onclick="this.parentElement.remove()">×</button>
    `;
    container.appendChild(row);
}

function closeModal() {
    document.getElementById('assignModal').classList.remove('active');
    currentStudentId = null;
}

async function submitProgram() {
    if (!currentStudentId) return;
    
    const program = [];
    GUNLER.forEach(gun => {
        const rows = document.querySelectorAll(`#tasks-${gun} .task-row`);
        rows.forEach(row => {
            const name = row.querySelector('.task-name').value.trim();
            if (!name) return;
            program.push({
                gun: gun,
                task: name,
                duration: row.querySelector('.duration-input').value || '1 Saat',
                questions: parseInt(row.querySelector('.question-input').value) || 0
            });
        });
    });
    
    if (program.length === 0) {
        showToast('Lütfen en az bir ders ekleyin.', 'error');
        return;
    }
    
    try {
        const res = await fetch(`${API_BASE}/teacher/assign-program`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ student_id: currentStudentId, program })
        });
        const data = await res.json();
        
        if (data.status === 'success') {
            showToast('Program başarıyla atandı! 🎉');
            closeModal();
        } else {
            showToast(data.message || 'Bir hata oluştu.', 'error');
        }
    } catch (e) {
        showToast('Sunucuya bağlanılamadı.', 'error');
    }
}
</script>

</body>
</html>
